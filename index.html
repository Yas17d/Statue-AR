<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR - Hybride</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS3DRenderer.js"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: relative;
            font-family: sans-serif;
        }
        #ar-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #msg {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; 
            z-index: 99999; /* Forcé au premier plan maximum */
            pointer-events: none; text-align: center;
            width: 90%; max-width: 400px;
        }
        #controls {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px; 
            z-index: 99999; /* Forcé au premier plan maximum */
            width: 90%; max-width: 400px;
            justify-content: center;
        }
        .btn {
            flex: 1; /* Donne la même taille aux deux boutons */
            background: #ff3b30; color: white;
            border: none; padding: 14px 10px;
            border-radius: 12px; font-weight: bold;
            font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
        .btn.active { background: #34c759; }
    </style>
</head>
<body>
    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>

    <div id="controls">
        <button id="btn-scan" class="btn active">1. Mode Scan</button>
        <button id="btn-touch" class="btn">2. Mode Tactile</button>
    </div>

    <script type="module">

        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const msg = document.getElementById('msg');
        const btnScan = document.getElementById('btn-scan');
        const btnTouch = document.getElementById('btn-touch');
        const container = document.querySelector('#ar-container');

        let currentMode = 'scan'; // 'scan' ou 'touch'
        let statueModel = null;

        const mindarTarget = new MindARThree({
            container: container,
            imageTargetSrc: './targets.mind',
            uiScanning: "no", // Modifié : On coupe le loader natif en boucle
        });

        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(2, 4, 5);
        scene.add(dirLight);

        // Ancre pour le mode scan automatique
        const anchor = mindarTarget.addAnchor(0);
