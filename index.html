<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrimoine AR - Superposition Statue</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <div style="position: absolute; z-index: 999; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 14px 28px; border-radius: 30px; font-family: sans-serif; text-align: center; font-size: 15px; width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); pointer-events: none;">
        Visez le panneau ou la statue pour activer les annotations AR
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-entity position="0 0 0" rotation="0 0 0" scale="1 1 1">
                <iframe src="https://sketchfab.com/models/8e5c831ef44a42c18addc30fd03e84c8/embed?annotation_tooltip_visible=1&annotations_visible=1&ui_controls=1&ui_infos=0&autostart=1" 
                        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; background: transparent; z-index: 10; pointer-events: auto;"
                        allow="xr-spatial-tracking; autoplay;">
                </iframe>
            </a-entity>

        </a-entity>
        </a-scene>

</body>
</html>
