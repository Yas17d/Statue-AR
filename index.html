<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR — Le Pâtre</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }

        #selection-screen {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px; z-index: 100000; padding: 2rem;
        }
        #selection-screen h1 { color: white; font-size: 22px; font-weight: 600; text-align: center; }
        #selection-screen p  { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: -16px; }

        .mode-card {
            width: 100%; max-width: 360px;
            background: rgba(79,142,247,0.2);
            border: 1px solid rgba(79,142,247,0.6);
            border-radius: 16px; padding: 24px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .mode-card .icon { font-size: 36px; flex-shrink: 0; }
        .mode-card h2 { color: white; font-size: 17px; font-weight: 600; margin: 0 0 4px; }
        .mode-card span { color: rgba(255,255,255,0.55); font-size: 13px; }

        #webxr-not-supported {
            display: none;
            background: rgba(255,59,48,0.15);
            border: 1px solid rgba(255,59,48,0.4);
            border-radius: 12px; padding: 16px 20px;
            color: rgba(255,255,255,0.8); font-size: 13px;
            text-align: center; width: 100%; max-width: 360px;
        }

        #ar-canvas { position: fixed; inset: 0; display: none; }

        #msg {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            z-index: 99999; pointer-events: none; text-align: center;
            max-width: 85%; display: none;
        }
        #btn-back {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 16px; border-radius: 10px;
            font-size: 14px; cursor: pointer; z-index: 99999;
            display: none; -webkit-tap-highlight-color: transparent;
        }

        #reticle-hint {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.15); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 13px;
            z-index: 99999; display: none; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            animation: pulse-hint 1.5s ease-in-out infinite;
        }
        @keyframes pulse-hint { 0%,100%{opacity:1} 50%{opacity:0.4} }

        #btn-place {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(52,199,89,0.9); color: white;
            border: none; padding: 16px 40px;
            border-radius: 30px; font-size: 16px; font-weight: 700;
            cursor: pointer; z-index: 99999; display: none;
            box-shadow: 0 4px 20px rgba(52,199,89,0.4);
            -webkit-tap-highlight-color: transparent;
        }

        #carousel-navigation-bar {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: none; align-items: center; justify-content: space-between;
            z-index: 99999; width: 85%; max-width: 320px;
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px; padding: 4px;
            backdrop-filter: blur(10px);
        }
        .nav-arrow {
            width: 40px; height: 40px; border: none;
            background: transparent; color: rgba(255,255,255,0.8);
            font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; -webkit-tap-highlight-color: transparent;
        }
        .nav-arrow:active { color: #ffc832; }
        #carousel-title {
            color: white; font-weight: 600; font-size: 14px;
            flex: 1; text-align: center;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; padding: 0 8px;
        }

        #annotation-card {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(26,26,26,0.95);
            border: 1px solid rgba(255,200,50,0.4);
            border-radius: 12px; padding: 18px;
            width: 90%; max-width: 350px;
            z-index: 100000; display: none;
            backdrop-filter: blur(12px);
            animation: slide-up 0.25s ease;
        }
        @keyframes slide-up {
            from { transform: translateX(-50%) translateY(15px); opacity:0; }
            to   { transform: translateX(-50%) translateY(0);    opacity:1; }
        }
        .ac-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }
        .ac-title { color: #fff; font-size: 16px; font-weight: 700; }
        .ac-close  { color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; padding: 2px 6px; }
        .ac-body   { color: rgba(255,255,255,0.85); font-size: 13.5px; line-height: 1.6; }
        .ac-body strong { color: #ffc832; font-weight: 500; }
        .ac-tag {
            display: inline-block; margin-top: 12px;
            background: rgba(255,200,50,0.12); color: #ffc832;
            border: 1px solid rgba(255,200,50,0.25);
            border-radius: 4px; padding: 2px 8px; font-size: 11px;
            font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1>🏛️ Patrimoine AR</h1>
        <p>Musée en plein air du Sart-Tilman</p>
        <div class="mode-card" id="pick-scan">
            <span class="icon">📷</span>
            <div>
                <h2>Lancer la visite AR</h2>
                <span>Pointez vers le sol pour poser la statue</span>
            </div>
        </div>
        <div id="webxr-not-supported">
            ⚠️ Votre navigateur ne supporte pas WebXR AR.<br>
            Utilisez <strong>Chrome Android</strong> ou <strong>Safari iOS 16+</strong>.
        </div>
    </div>

    <canvas id="ar-canvas"></canvas>
    <div id="msg">Initialisation...</div>
    <button id="btn-back">← Retour</button>
    <div id="reticle-hint">🎯 Pointez vers le sol — surface détectée</div>
    <button id="btn-place">📍 Poser la statue ici</button>

    <div id="carousel-navigation-bar">
        <button class="nav-arrow" id="nav-prev">◂</button>
        <span id="carousel-title">Le Pâtre</span>
        <button class="nav-arrow" id="nav-next">▸</button>
    </div>

    <div id="annotation-card">
        <div class="ac-header">
            <span class="ac-title" id="ac-title"></span>
            <span class="ac-close" id="ac-close">✕</span>
        </div>
        <div class="ac-body" id="ac-body"></div>
        <span class="ac-tag" id="ac-tag"></span>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GLTFLoader }  from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js';

        const DATA_INFOS = [
            {
                btnLabel: '1. Le Pâtre',
                title: 'Le Pâtre — Fiche technique',
                body: '<strong>Artiste :</strong> Idel Ianchelevici<br><strong>Année :</strong> 1956<br><strong>Matériaux :</strong> Bronze<br><strong>Dimensions :</strong> H. 340 cm · L. 93 cm · l. 54,5 cm.',
                tag: 'Général · Statuaire'
            },
            {
                btnLabel: '2. Origine du projet',
                title: 'Le projet colonial (1/2)',
                body: 'Au milieu des années 1950, l\'État belge commande à Ianchelevici des bas-reliefs pour un monument à Léopoldville (Kinshasa). Mais une fois sur place, il choisit de créer de monumentales <strong>statues en ronde-bosse</strong>.',
                tag: 'Histoire · Contexte'
            },
            {
                btnLabel: '3. Un symbole fort',
                title: 'La dignité célébrée (2/2)',
                body: 'Ianchelevici sculpte <strong>le pâtre, le pêcheur et le chasseur</strong> — trois piliers de l\'économie traditionnelle. Loin des clichés coloniaux, il magnifie l\'homme africain dans une <strong>dignité enfin reconnue</strong>.',
                tag: 'Histoire · Symbole'
            },
            {
                btnLabel: '4. L\'Artiste',
                title: 'Idel Ianchelevici (1909–1994)',
                body: 'Arrivé à Liège en 1928, 1er prix de statuaire des Beaux-Arts en 1933. Œuvres majeures : <strong>Le Plongeur</strong> (Liège, 1939), <strong>Le Résistant</strong> (Fort de Breendonk, 1947).',
                tag: 'Biographie · Maître'
            },
            {
                btnLabel: '5. Prix Triennal',
                title: 'Mise à l\'honneur',
                body: 'Depuis 1997, le Musée en plein air organise le <strong>Prix Triennal Ianchelevici</strong>, créé à l\'initiative de l\'ASBL « Les Amis de Ianchelevici ».',
                tag: 'Héritage · Distinction'
            }
        ];

        let currentIndex = 0;

        const selectionScreen = document.getElementById('selection-screen');
        const arCanvas        = document.getElementById('ar-canvas');
        const msgEl           = document.getElementById('msg');
        const btnBack         = document.getElementById('btn-back');
        const reticleHint     = document.getElementById('reticle-hint');
        const btnPlace        = document.getElementById('btn-place');
        const carouselBar     = document.getElementById('carousel-navigation-bar');
        const carouselTitle   = document.getElementById('carousel-title');
        const annotCard       = document.getElementById('annotation-card');
        const notSupported    = document.getElementById('webxr-not-supported');

        const showMsg = t => { msgEl.textContent = t; };

        function updateInfoDisplay() {
            const d = DATA_INFOS[currentIndex];
            carouselTitle.textContent = d.btnLabel;
            document.getElementById('ac-title').innerHTML = d.title;
            document.getElementById('ac-body').innerHTML  = d.body;
            document.getElementById('ac-tag').textContent = d.tag;
            annotCard.style.display = 'block';
        }
        function closeInfoCard() { annotCard.style.display = 'none'; }

        document.getElementById('ac-close').addEventListener('click', closeInfoCard);
        document.getElementById('nav-prev').addEventListener('click', e => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + DATA_INFOS.length) % DATA_INFOS.length;
            updateInfoDisplay();
        });
        document.getElementById('nav-next').addEventListener('click', e => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % DATA_INFOS.length;
            updateInfoDisplay();
        });
        carouselBar.addEventListener('click', e => { e.stopPropagation(); updateInfoDisplay(); });

        let renderer, scene, camera;
        let reticleMesh, statueModel;
        let hitTestSource     = null;
        let hitTestRequested  = false;
        let statueAnchored    = false;
        let xrSession         = null;

        function initThree() {
            renderer = new THREE.WebGLRenderer({ canvas: arCanvas, antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene  = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const dir1 = new THREE.DirectionalLight(0xffffff, 1.0);
            dir1.position.set(2, 4, 5); scene.add(dir1);
            const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
            dir2.position.set(-2, -2, -3); scene.add(dir2);

            // Réticule amélioré
            const ring = new THREE.RingGeometry(0.08, 0.12, 32);
            ring.rotateX(-Math.PI / 2);
            reticleMesh = new THREE.Mesh(
                ring,
                new THREE.MeshBasicMaterial({ color: 0x4f8ef7, side: THREE.DoubleSide })
            );
            // Empêche la matrice de Three.js d'écraser la matrice WebXR native
            reticleMesh.matrixAutoUpdate = false; 
            reticleMesh.visible = false;
            scene.add(reticleMesh);
        }

        function loadStatue() {
            const draco = new DRACOLoader();
            draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(draco);

            loader.load('./Statue25.glb', (gltf) => {
                const model = gltf.scene;
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);
                model.position.y += size.y / 2;

                const wrapper = new THREE.Group();
                wrapper.add(model);

                const scaleFactor = 3.4 / Math.max(size.x, size.y, size.z);
                wrapper.scale.setScalar(scaleFactor);

                wrapper.rotation.x = -Math.PI / 2;
                wrapper.rotation.y =  Math.PI;
                wrapper.rotation.z =  Math.PI;

                statueModel = wrapper;
                statueModel.matrixAutoUpdate = false; // Nécessaire pour l'ancrage de matrice direct
                statueModel.visible = false;
                scene.add(statueModel);

                showMsg('🎯 Pointez vers le sol');
                reticleHint.style.display = 'block';

            }, undefined, () => showMsg('❌ Erreur GLB'));
        }

        async function startWebXR() {
            if (!navigator.xr) { notSupported.style.display = 'block'; return; }

            const supported = await navigator.xr.isSessionSupported('immersive-ar');
            if (!supported) { notSupported.style.display = 'block'; return; }

            initThree();
            loadStatue();

            selectionScreen.style.display = 'none';
            arCanvas.style.display        = 'block';
            msgEl.style.display           = 'block';
            btnBack.style.display         = 'block';
            showMsg('📷 Démarrage AR...');

            xrSession = await navigator.xr.requestSession('immersive-ar', {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });

            // "local-floor" force WebXR à traquer les pas et déplacements réels dans l'espace physique
            renderer.xr.setReferenceSpaceType('local-floor');
            await renderer.xr.setSession(xrSession);

            xrSession.addEventListener('end', onSessionEnd);
            renderer.setAnimationLoop(onXRFrame);
        }

        function onXRFrame(time, frame) {
            if (!frame) return;

            const refSpace = renderer.xr.getReferenceSpace();

            if (!statueAnchored) {
                if (!hitTestRequested) {
                    hitTestRequested = true;
                    frame.session.requestReferenceSpace('viewer').then(viewerSpace => {
                        frame.session.requestHitTestSource({ space: viewerSpace })
                            .then(src => { hitTestSource = src; });
                    });
                }

                if (hitTestSource) {
                    const hits = frame.getHitTestResults(hitTestSource);
                    if (hits.length > 0) {
                        const pose = hits[0].getPose(refSpace);
                        reticleMesh.visible = true;
                        // On applique directement la matrice de transformation spatiale de WebXR
                        reticleMesh.matrix.fromArray(pose.transform.matrix);
                        
                        btnPlace.style.display = 'block';
                        showMsg('✅ Surface détectée');
                    } else {
                        reticleMesh.visible = false;
                        btnPlace.style.display = 'none';
                        showMsg('🎯 Pointez vers le sol');
                    }
                }
            }

            renderer.render(scene, camera);
        }

        btnPlace.addEventListener('click', () => {
            if (!reticleMesh.visible || !statueModel || statueAnchored) return;

            // Transfère la matrice de position du monde réel du réticule à la statue
            statueModel.matrix.copy(reticleMesh.matrix);
            statueModel.visible = true;
            statueAnchored = true;

            reticleMesh.visible       = false;
            btnPlace.style.display    = 'none';
            reticleHint.style.display = 'none';
            carouselBar.style.display = 'flex';
            updateInfoDisplay();
            showMsg('🔭 Déplacez-vous librement autour de la statue');
            setTimeout(() => { msgEl.style.display = 'none'; }, 5000);

            if (hitTestSource) { hitTestSource.cancel(); hitTestSource = null; }
        });

        function onSessionEnd() {
            xrSession = null;
            renderer.setAnimationLoop(null);
        }

        btnBack.addEventListener('click', async () => {
            if (xrSession) await xrSession.end();
            selectionScreen.style.display = 'flex';
            arCanvas.style.display        = 'none';
            msgEl.style.display           = 'none';
            btnBack.style.display         = 'block';
            btnPlace.style.display        = 'none';
            reticleHint.style.display     = 'none';
            carouselBar.style.display     = 'none';
            closeInfoCard();
            statueAnchored   = false;
            hitTestRequested = false;
            hitTestSource    = null;
        });

        document.getElementById('pick-scan').addEventListener('click', startWebXR);

        if (!navigator.xr) notSupported.style.display = 'block';
        else navigator.xr.isSessionSupported('immersive-ar')
            .then(ok => { if (!ok) notSupported.style.display = 'block'; });
    </script>
</body>
</html>
