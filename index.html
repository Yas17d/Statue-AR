<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR</title>

    <!-- MindAR en premier (embarque Three.js r128) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
    <!-- Addons Three.js accrochés au même global THREE -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }

        #label-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .annotation-pin {
            background: #ff3b30;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border: 2px solid white;
            white-space: nowrap;
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
        }

        #info-popup {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 20px;
            border-radius: 14px;
            max-width: 80vw;
            font-size: 15px;
            text-align: center;
            z-index: 10;
            pointer-events: auto;
        }
        #info-popup button {
            margin-top: 10px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }

        #status {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="status">Pointez la caméra vers la statue...</div>

    <div id="info-popup">
        <div id="popup-text"></div>
        <button onclick="document.getElementById('info-popup').style.display='none'">Fermer</button>
    </div>

    <script>
        // ── Annotations : modifie titres et descriptions ici ─────────────────
        const mesAnnotations = [
            {
                title: "La Tête",
                description: "Détail sculpté de la tête.",
                x: 0.00, y: 0.00, z: 0.00
            },
            {
                title: "Le Drapé",
                description: "Tissu sculpté en marbre.",
                x: -1.05, y: -3.82, z: 0.14
            },
            {
                title: "Détail corps",
                description: "Détail du corps de la statue.",
                x: 0.01, y: -0.81, z: -0.38
            },
            {
                title: "Repère A",
                description: "À recalibrer.",
                x: 0.0, y: -2.0, z: 0.0
            },
            {
                title: "Le Socle",
                description: "Socle de la statue.",
                x: 0.56, y: -3.30, z: -0.70
            },
            {
                title: "Repère B",
                description: "À recalibrer.",
                x: 0.0, y: -2.5, z: 0.0
            }
        ];

        document.addEventListener("DOMContentLoaded", async () => {

            // ── 1. MindAR ────────────────────────────────────────────────────
            const mindarTarget = new MINDAR.IMAGE.MindARThree({
                container: document.body,
                imageTargetSrc: './targets.mind',
                uiLoading: "yes",
                uiScanning: "yes",
                uiError: "yes",
            });
            const { renderer, scene, camera } = mindarTarget;

            // ── 2. CSS2DRenderer ─────────────────────────────────────────────
            const labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.id = 'label-container';
            document.body.appendChild(labelRenderer.domElement);

            // ── 3. Lumières ───────────────────────────────────────────────────
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(0, 2, 2);
            scene.add(dirLight);

            // ── 4. Ancre + indicateur tracking ───────────────────────────────
            const anchor = mindarTarget.addAnchor(0);
            const statusEl = document.getElementById('status');

            anchor.onTargetFound = () => {
                statusEl.style.opacity = '0';
                setTimeout(() => { statusEl.style.display = 'none'; }, 600);
            };
            anchor.onTargetLost = () => {
                statusEl.style.display = 'block';
                statusEl.style.opacity = '1';
                statusEl.textContent = "Pointez vers la statue...";
            };

            // ── 5. Chargement GLB ─────────────────────────────────────────────
            const loader = new THREE.GLTFLoader();
            loader.load(
                './Statue.glb',           // ← vérifier casse exacte sur GitHub
                (gltf) => {
                    const model = gltf.scene;

                    // Recentrage automatique
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    model.position.sub(center);

                    // Échelle automatique (1 unité = largeur image cible)
                    const maxDim = Math.max(size.x, size.y, size.z);
                    model.scale.setScalar(1.0 / maxDim);

                    anchor.group.add(model);

                    // ── 6. Annotations ───────────────────────────────────────
                    const popup    = document.getElementById('info-popup');
                    const popupTxt = document.getElementById('popup-text');

                    mesAnnotations.forEach((data) => {
                        const div = document.createElement('div');
                        div.className = 'annotation-pin';
                        div.textContent = data.title;

                        div.addEventListener('click', (e) => {
                            e.stopPropagation();
                            popupTxt.innerHTML =
                                `<strong>${data.title}</strong><br>${data.description}`;
                            popup.style.display = 'block';
                        });

                        const label = new THREE.CSS2DObject(div);
                        label.position.set(
                            data.x - center.x,
                            data.y - center.y,
                            data.z - center.z
                        );
                        anchor.group.add(label);
                    });
                },
                undefined,
                (err) => {
                    console.error('Erreur GLB :', err);
                    statusEl.style.display = 'block';
                    statusEl.style.opacity = '1';
                    statusEl.textContent = 'Erreur chargement modèle 3D';
                }
            );

            // ── 7. Démarrage avec gestion d'erreur caméra ────────────────────
            try {
                await mindarTarget.start();
            } catch (err) {
                console.warn('Caméra indisponible :', err);
                statusEl.style.display = 'block';
                statusEl.style.opacity = '1';
                statusEl.textContent = 'Caméra non disponible — testez sur smartphone en HTTPS';
            }

            // ── 8. Boucle de rendu ────────────────────────────────────────────
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            });

            // ── 9. Resize complet ─────────────────────────────────────────────
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
                labelRenderer.setSize(w, h);
            });
        });
    </script>
</body>
</html>
