<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }

        #selection-screen {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px; z-index: 100000; padding: 2rem;
        }
        #selection-screen h1 { color: white; font-size: 22px; font-weight: 600; text-align: center; }
        #selection-screen p  { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: -16px; }
        .mode-card {
            width: 100%; max-width: 360px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 20px 24px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .mode-card.highlight { background: rgba(79,142,247,0.2); border-color: rgba(79,142,247,0.6); }
        .mode-card .icon { font-size: 32px; flex-shrink: 0; }
        .mode-card h2 { color: white; font-size: 16px; font-weight: 600; margin: 0 0 4px; }
        .mode-card span { color: rgba(255,255,255,0.5); font-size: 13px; }

        #ar-container { position: fixed; inset: 0; display: none; }

        #msg {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            z-index: 99999; pointer-events: none; text-align: center;
            max-width: 90%; display: none;
        }
        #btn-back {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 16px; border-radius: 10px;
            font-size: 14px; cursor: pointer; z-index: 99999;
            display: none; -webkit-tap-highlight-color: transparent;
        }
        
        #controls {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            display: none; gap: 12px; z-index: 99999;
        }
        .btn {
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 20px;
            font-weight: 600; font-size: 13px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn.active { background: rgba(79,142,247,0.85); border-color: transparent; color: white; }

        #tap-hint {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.15); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 13px;
            z-index: 99999; display: none; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            animation: pulse-hint 1.5s ease-in-out infinite;
        }
        @keyframes pulse-hint { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        /* ── NOUVEAU : Barre de navigation style Sketchfab/Exemple ── */
        #carousel-navigation-bar {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: none; align-items: center; justify-content: space-between;
            z-index: 99999; width: 85%; max-width: 320px;
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px; padding: 4px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .nav-arrow {
            width: 40px; height: 40px; border: none;
            background: transparent; color: rgba(255, 255, 255, 0.8);
            font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-arrow:active { background: rgba(255, 255, 255, 0.15); color: #ffc832; }
        
        #carousel-title {
            color: white; font-weight: 600; font-size: 14px;
            flex: 1; text-align: center; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; padding: 0 8px;
        }

        /* ── Fiche annotation (Design Sombre + Touche Or) ── */
        #annotation-card {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid rgba(255, 200, 50, 0.4);
            border-radius: 12px; padding: 18px;
            width: 90%; max-width: 350px;
            z-index: 100000; display: none;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            animation: slide-up 0.25s ease;
        }
        @keyframes slide-up {
            from { transform: translateX(-50%) translateY(15px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
        }
        #annotation-card .ac-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }
        #annotation-card .ac-title {
            color: #ffffff; font-size: 16px; font-weight: 700;
        }
        #annotation-card .ac-close {
            color: rgba(255,255,255,0.4); font-size: 18px;
            cursor: pointer; padding: 2px 6px;
        }
        #annotation-card .ac-body {
            color: rgba(255,255,255,0.85);
            font-size: 13.5px; line-height: 1.5;
        }
        #annotation-card .ac-body strong { color: #ffc832; font-weight: 500; }
        #annotation-card .ac-tag {
            display: inline-block; margin-top: 12px;
            background: rgba(255,200,50,0.12);
            color: #ffc832; border: 1px solid rgba(255,200,50,0.25);
            border-radius: 4px; padding: 2px 8px; font-size: 11px;
            font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1>🏛️ Patrimoine AR</h1>
        <p>Choisissez votre mode de visualisation</p>
        <div class="mode-card" id="pick-scan">
            <span class="icon">📷</span>
            <div><h2>Mode Scan</h2><span>Détecte automatiquement l'image cible</span></div>
        </div>
        <div class="mode-card highlight" id="pick-touch">
            <span class="icon">👆</span>
            <div><h2>Mode Tactile</h2><span>Tapez l'écran pour poser la statue</span></div>
        </div>
    </div>

    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>
    <button id="btn-back">← Retour</button>
    
    <div id="controls">
        <button id="btn-scan" class="btn">📷 Scan</button>
        <button id="btn-touch" class="btn">👆 Tactile</button>
    </div>
    
    <div id="tap-hint">👆 Touchez l'écran pour poser la statue</div>

    <div id="carousel-navigation-bar">
        <button class="nav-arrow" id="nav-prev">◂</button>
        <span id="carousel-title">Le Pâtre</span>
        <button class="nav-arrow" id="nav-next">▸</button>
    </div>
    
    <div id="annotation-card">
        <div class="ac-header">
            <span class="ac-title" id="ac-title">Titre</span>
            <span class="ac-close" id="ac-close">✕</span>
        </div>
        <div class="ac-body" id="ac-body">Texte</div>
        <span class="ac-tag" id="ac-tag">Tag</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // ── Données réelles de la statue avec touches de couleur or (balises strong) ──
        // ── Données réelles de la statue reformulées et intégrées ──
        const DATA_INFOS = [
            {
                btnLabel: '1. Le Pâtre',
                title: 'Le Pâtre (Fiche technique)',
                body: '<strong>Artiste :</strong> Idel Ianchelevici<br><strong>Année :</strong> 1956<br><strong>Matériaux :</strong> Bronze<br><strong>Dimensions :</strong> Hauteur : 340 cm · Longueur : 93 cm · Largeur : 54,5 cm.',
                tag: 'Général · Statuaire'
            },
            {
                btnLabel: '2. Origine du projet',
                title: 'Le projet colonial (1/2)',
                body: 'Au milieu des années 1950, l’État belge commande à Ianchelevici des bas-reliefs pour un monument à Léopoldville (Kinshasa) dédié à l\'explorateur Stanley. Mais une fois sur place, le sculpteur bouleverse le projet : il choisit de créer de monumentales <strong>statues en ronde-bosse</strong>.',
                tag: 'Histoire · Contexte'
            },
            {
                btnLabel: '3. Un symbole fort',
                title: 'La dignité célébrée (2/2)',
                body: 'Ianchelevici sculpte trois piliers de l’économie traditionnelle : <strong>le pâtre, le pêcheur et le chasseur</strong>. Loin des clichés coloniaux de l\'époque, il magnifie l\'homme africain dans une <strong>dignité enfin reconnue</strong>. Preuve de la force du symbole : alors que les statues coloniales ont été déboulonnées à Kinshasa, ces trois œuvres y sont toujours fièrement en place.',
                tag: 'Histoire · Symbole'
            },
            {
                btnLabel: '4. L\'Artiste',
                title: 'Idel Ianchelevici (1909-1994)',
                body: 'Arrivé à Liège en 1928, il décroche le 1er prix de statuaire des Beaux-Arts en 1933. Installé ensuite en région parisienne, sa carrière est jalonnée de chefs-d’œuvre monumentaux acclamés à travers l\'Europe, comme <strong>Le Plongeur</strong> (Liège, 1939) ou <strong>Le Résistant</strong> (Fort de Breendonk, 1947).',
                tag: 'Biographie · Maître'
            },
            {
                btnLabel: '5. Prix Triennal',
                title: 'Mise à l\'honneur',
                body: 'Depuis 1997, le Musée en plein air perpétue la mémoire et le génie du sculpteur en organisant le prestigieux <strong>Prix Triennal Ianchelevici</strong>, créé à l’initiative de l’ASBL « Les Amis de Ianchelevici ».',
                tag: 'Héritage · Distinction'
            }
        ];

        let currentIndex = 0;
        
        const selectionScreen = document.getElementById('selection-screen');
        const arContainer     = document.getElementById('ar-container');
        const msgEl           = document.getElementById('msg');
        const btnBack         = document.getElementById('btn-back');
        const controls        = document.getElementById('controls');
        const btnScan         = document.getElementById('btn-scan');
        const btnTouch        = document.getElementById('btn-touch');
        const tapHint         = document.getElementById('tap-hint');
        const annotCard       = document.getElementById('annotation-card');
        const carouselBar     = document.getElementById('carousel-navigation-bar');
        const carouselTitle   = document.getElementById('carousel-title');

        let currentMode   = null;
        let statueModel   = null;
        let mindarTarget = null;
        let camera       = null;
        let renderer     = null;
        let anchor       = null;
        let manualGroup  = null;
        let arStarted    = false;

        const showMsg = t => { msgEl.textContent = t; };

        // Mettre à jour l'affichage de la bulle d'info et de la barre
        function updateInfoDisplay() {
            const data = DATA_INFOS[currentIndex];
            carouselTitle.textContent = data.btnLabel;
            
            document.getElementById('ac-title').innerHTML = data.title;
            document.getElementById('ac-body').innerHTML  = data.body;
            document.getElementById('ac-tag').textContent   = data.tag;
            
            annotCard.style.display = 'block';
        }
        
        function closeInfoCard() { annotCard.style.display = 'none'; }

        document.getElementById('ac-close').addEventListener('click', closeInfoCard);

        // Gestion de la navigation gauche / droite
        document.getElementById('nav-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + DATA_INFOS.length) % DATA_INFOS.length;
            updateInfoDisplay();
        });

        document.getElementById('nav-next').addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % DATA_INFOS.length;
            updateInfoDisplay();
        });

        // Clic sur le texte central de la barre rouvre la bulle si fermée
        carouselBar.addEventListener('click', (e) => {
            e.stopPropagation();
            updateInfoDisplay();
        });

        function initAR() {
            mindarTarget = new MindARThree({
                container: arContainer,
                imageTargetSrc: './targets.mind',
                uiScanning: 'no',
            });

            const result = mindarTarget;
            renderer = result.renderer;
            camera   = result.camera;
            const scene = result.scene;

            renderer.outputColorSpace = THREE.SRGBColorSpace;
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(2, 4, 5); scene.add(dir);
            const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
            dir2.position.set(-2, -2, -3); scene.add(dir2);

            anchor      = mindarTarget.addAnchor(0);
            manualGroup = new THREE.Group();
            scene.add(manualGroup);

            anchor.onTargetFound = () => {
                if (currentMode === 'scan') {
                    showMsg('✅ Cible trouvée');
                    carouselBar.style.display = 'flex';
                    updateInfoDisplay();
                }
            };
            anchor.onTargetLost = () => {
                if (currentMode === 'scan') {
                    closeInfoCard();
                    carouselBar.style.display = 'none';
                    showMsg('🔍 Cherche la cible...');
                }
            };

            const draco = new DRACOLoader();
            draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(draco);

            loader.load('./Statue25.glb', (gltf) => {
                const model = gltf.scene;
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);

                const wrapper = new THREE.Group();
                wrapper.add(model);

                const targetWidthMeters = 3.0;
                const statueRealHeight  = 3.5;
                const scaleFactor = (statueRealHeight / Math.max(size.x, size.y, size.z)) * targetWidthMeters;
                wrapper.scale.setScalar(scaleFactor);

                wrapper.rotation.x = -Math.PI / 2;
                wrapper.rotation.y =  Math.PI;
                wrapper.rotation.z =  Math.PI;

                statueModel = wrapper;

                if (currentMode === 'scan') {
                    anchor.group.add(statueModel);
                    showMsg('🔍 Visez votre image cible');
                } else {
                    manualGroup.add(statueModel);
                    statueModel.visible = false;
                    tapHint.style.display = 'block';
                }

            }, undefined, () => showMsg('❌ Erreur GLB'));

            arContainer.addEventListener('click', (e) => {
                if (annotCard.style.display === 'block') {
                    closeInfoCard(); return;
                }
                if (currentMode !== 'touch' || !statueModel) return;

                const camDir = new THREE.Vector3(0, 0, -1);
                camDir.applyQuaternion(camera.quaternion);
                const pos = camera.position.clone().addScaledVector(camDir, 2);
                manualGroup.position.copy(pos);
                const lookTarget = new THREE.Vector3(camera.position.x, manualGroup.position.y, camera.position.z);
                manualGroup.lookAt(lookTarget);

                statueModel.visible = true;
                tapHint.style.display = 'none';
                carouselBar.style.display = 'flex';
                updateInfoDisplay();
                showMsg('');
            });

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        async function launchAR(mode) {
            selectionScreen.style.display = 'none';
            arContainer.style.display     = 'block';
            msgEl.style.display           = 'block';
            btnBack.style.display         = 'block';
            controls.style.display        = 'flex';
            currentMode = mode;
            updateBtns();

            if (!arStarted) {
                showMsg('📷 Démarrage caméra...');
                initAR();
                try {
                    await mindarTarget.start();
                    document.querySelectorAll('.mindar-ui-overlay').forEach(el => el.style.display = 'none');
                    arStarted = true;
                    if (mode === 'scan') showMsg('🔍 Visez votre image cible');
                    else { showMsg(''); tapHint.style.display = 'block'; }
                } catch {
                    showMsg('❌ Caméra bloquée');
                }
            }
        }

        function setMode(mode) {
            currentMode = mode;
            updateBtns();
            closeInfoCard();
            carouselBar.style.display = 'none';
            if (!statueModel) return;

            if (mode === 'scan') {
                manualGroup.remove(statueModel);
                anchor.group.add(statueModel);
                statueModel.visible = true;
                tapHint.style.display = 'none';
                showMsg('🔍 Visez votre image cible');
            } else {
                anchor.group.remove(statueModel);
                manualGroup.add(statueModel);
                statueModel.visible = false;
                tapHint.style.display = 'block';
                showMsg('');
            }
        }

        function updateBtns() {
            btnScan.classList.toggle('active',  currentMode === 'scan');
            btnTouch.classList.toggle('active', currentMode === 'touch');
        }

        btnBack.addEventListener('click', () => {
            selectionScreen.style.display = 'flex';
            arContainer.style.display     = 'none';
            msgEl.style.display           = 'none';
            btnBack.style.display         = 'none';
            controls.style.display        = 'none';
            tapHint.style.display         = 'none';
            carouselBar.style.display     = 'none';
            closeInfoCard();
        });

        document.getElementById('pick-scan').addEventListener('click',  () => launchAR('scan'));
        document.getElementById('pick-touch').addEventListener('click', () => launchAR('touch'));
        btnScan.addEventListener('click',  () => setMode('scan'));
        btnTouch.addEventListener('click', () => setMode('touch'));
    </script>
</body>
</html>
