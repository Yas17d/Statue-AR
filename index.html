<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR - Hybride</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.160.0/examples/jsm/renderers/CSS3DRenderer.js"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: relative;
            font-family: sans-serif;
        }
        #ar-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #msg {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; 
            z-index: 99999; /* Forcé au premier plan maximum */
            pointer-events: none; text-align: center;
            width: 90%; max-width: 400px;
        }
        #controls {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px; 
            z-index: 99999; /* Forcé au premier plan maximum */
            width: 90%; max-width: 400px;
            justify-content: center;
        }
        .btn {
            flex: 1; /* Donne la même taille aux deux boutons */
            background: #ff3b30; color: white;
            border: none; padding: 14px 10px;
            border-radius: 12px; font-weight: bold;
            font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }
        .btn.active { background: #34c759; }
    </style>
</head>
<body>
    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>

    <div id="controls">
        <button id="btn-scan" class="btn active">1. Mode Scan</button>
        <button id="btn-touch" class="btn">2. Mode Tactile</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const msg = document.getElementById('msg');
        const btnScan = document.getElementById('btn-scan');
        const btnTouch = document.getElementById('btn-touch');
        const container = document.querySelector('#ar-container');

        let currentMode = 'scan'; // 'scan' ou 'touch'
        let statueModel = null;

        // ── 1. Initialisation de MindAR ───────────────────────────────────────
        const mindarTarget = new MindARThree({
            container: container,
            imageTargetSrc: './targets.mind',
            uiScanning: "yes",
        });

        const { renderer, scene, camera } = mindarTarget;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // Éclairage indispensable pour ton modèle GLB
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(2, 4, 5);
        scene.add(dirLight);

        // Ancre pour le mode scan automatique
        const anchor = mindarTarget.addAnchor(0);

        // Groupe factice pour le mode manuel (placé devant la caméra)
        const manualGroup = new THREE.Group();
        scene.add(manualGroup);

        // ── 2. Chargement sécurisé de ta statue ──────────────────────────────
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        loader.load('./Statue25.glb', (gltf) => {
            statueModel = gltf.scene;

            // Recalcul du centrage strict Metashape
            const box = new THREE.Box3().setFromObject(statueModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            statueModel.position.set(-center.x, -center.y, -center.z);

            // Conteneur pivot
            const wrapper = new THREE.Group();
            wrapper.add(statueModel);
            
            // Échelle de base forcée
            const maxDim = Math.max(size.x, size.y, size.z);
            wrapper.scale.setScalar(1.0 / maxDim);

            // Par défaut, on l'attache à l'ancre de scan automatique
            statueModel = wrapper;
            anchor.group.add(statueModel);
            msg.textContent = '🔍 Prêt ! Visez votre image cible';
        }, undefined, (err) => {
            msg.textContent = '❌ Erreur de chargement du GLB';
            console.error(err);
        });

        // ── 3. Gestion des modes de détection ────────────────────────────────
        anchor.onTargetFound = () => { 
            if(currentMode === 'scan') msg.textContent = '✅ Cible trouvée !'; 
        };
        anchor.onTargetLost = () => { 
            if(currentMode === 'scan') msg.textContent = '🔍 Cherche la cible...'; 
        };

        btnScan.addEventListener('click', () => {
            currentMode = 'scan';
            btnScan.classList.add('active');
            btnTouch.classList.remove('active');
            msg.textContent = '🔍 Mode Scan activé. Visez l\'image';
            
            // On remet le modèle sur l'ancre automatique
            if (statueModel) {
                manualGroup.remove(statueModel);
                anchor.group.add(statueModel);
                statueModel.position.set(0, 0, 0); // Reset position
            }
        });

        btnTouch.addEventListener('click', () => {
            currentMode = 'touch';
            btnTouch.classList.add('active');
            btnScan.classList.remove('active');
            msg.textContent = '👆 Mode Manuel : touchez l\'écran pour poser la statue';
            
            // On bascule le modèle sur le contrôle manuel
            if (statueModel) {
                anchor.group.remove(statueModel);
                manualGroup.add(statueModel);
                // On la cache tant qu'on a pas cliqué
                statueModel.visible = false; 
            }
        });

        // ── 4. Option 2 : Cliquer sur la zone pour positionner ────────────────
        container.addEventListener('click', (e) => {
            if (currentMode !== 'touch' || !statueModel) return;

            // Rendre la statue visible immédiatement
            statueModel.visible = true;

            // Positionner la statue à 1.5 mètre pile devant l'objectif du téléphone
            const distance = 1.5; 
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            statueModel.position.copy(camera.position).addScaledVector(direction, distance);
            
            // Orienter la statue vers l'utilisateur pour qu'elle soit face à nous
            statueModel.lookAt(camera.position.x, statueModel.position.y, camera.position.z);

            msg.textContent = '📍 Statue positionnée !';
        });

        // ── 5. Démarrage caméra ──────────────────────────────────────────────
        try {
            await mindarTarget.start();
        } catch(e) {
            msg.textContent = '❌ Caméra bloquée (Vérifiez le HTTPS)';
        }

        // Boucle d'animation
        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
