<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patrimoine AR</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }

        #selection-screen {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px; z-index: 100000; padding: 2rem;
        }
        #selection-screen h1 { color: white; font-size: 22px; font-weight: 600; text-align: center; }
        #selection-screen p  { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: -16px; }
        .mode-card {
            width: 100%; max-width: 360px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 20px 24px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .mode-card.highlight { background: rgba(79,142,247,0.2); border-color: rgba(79,142,247,0.6); }
        .mode-card .icon { font-size: 32px; flex-shrink: 0; }
        .mode-card h2 { color: white; font-size: 16px; font-weight: 600; margin: 0 0 4px; }
        .mode-card span { color: rgba(255,255,255,0.5); font-size: 13px; }

        #ar-container { position: fixed; inset: 0; display: none; }

        #msg {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            z-index: 99999; pointer-events: none; text-align: center;
            max-width: 90%; display: none;
        }
        #btn-back {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 16px; border-radius: 10px;
            font-size: 14px; cursor: pointer; z-index: 99999;
            display: none; -webkit-tap-highlight-color: transparent;
        }
        #controls {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: none; gap: 12px; z-index: 99999;
        }
        .btn {
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 20px; border-radius: 12px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn.active { background: rgba(52,199,89,0.85); border-color: transparent; color: white; }

        #tap-hint {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.15); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 13px;
            z-index: 99999; display: none; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            animation: pulse-hint 1.5s ease-in-out infinite;
        }
        @keyframes pulse-hint { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

        /* ── Points lumineux AR ── */
        .ar-dot {
            position: fixed;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 9999;
            display: none;
            pointer-events: auto;
        }
        .ar-dot .ring {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: rgba(255, 200, 50, 0.9);
            box-shadow: 0 0 12px 4px rgba(255, 200, 50, 0.6);
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        .ar-dot .ring-outer {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid rgba(255, 200, 50, 0.4);
            animation: pulse-outer 1.4s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.2); opacity: 0.7; }
        }
        @keyframes pulse-outer {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.5); opacity: 0; }
        }

        /* ── Fiche annotation ── */
        #annotation-card {
            position: fixed; bottom: 110px; left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.92);
            border: 1px solid rgba(255,200,50,0.4);
            border-radius: 16px; padding: 18px 20px;
            width: 90%; max-width: 360px;
            z-index: 99999; display: none;
            backdrop-filter: blur(12px);
            animation: slide-up 0.25s ease;
        }
        @keyframes slide-up {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
        }
        #annotation-card .ac-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
        }
        #annotation-card .ac-title {
            color: rgba(255,200,50,1);
            font-size: 15px; font-weight: 600;
        }
        #annotation-card .ac-close {
            color: rgba(255,255,255,0.5); font-size: 20px;
            cursor: pointer; line-height: 1;
            padding: 0 4px;
        }
        #annotation-card .ac-body {
            color: rgba(255,255,255,0.85);
            font-size: 13px; line-height: 1.6;
        }
        #annotation-card .ac-tag {
            display: inline-block; margin-top: 10px;
            background: rgba(255,200,50,0.15);
            color: rgba(255,200,50,0.9);
            border: 1px solid rgba(255,200,50,0.3);
            border-radius: 20px; padding: 3px 12px;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h1>🏛️ Patrimoine AR</h1>
        <p>Choisissez votre mode de visualisation</p>
        <div class="mode-card" id="pick-scan">
            <span class="icon">📷</span>
            <div><h2>Mode Scan</h2><span>Détecte automatiquement l'image cible</span></div>
        </div>
        <div class="mode-card highlight" id="pick-touch">
            <span class="icon">👆</span>
            <div><h2>Mode Tactile</h2><span>Tapez l'écran pour poser la statue</span></div>
        </div>
    </div>

    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>
    <button id="btn-back">← Retour</button>
    <div id="controls">
        <button id="btn-scan" class="btn">📷 Scan</button>
        <button id="btn-touch" class="btn">👆 Tactile</button>
    </div>
    <div id="tap-hint">👆 Touchez l'écran pour poser la statue</div>

    <div class="ar-dot" id="dot-0"><div class="ring-outer"></div><div class="ring"></div></div>
    <div class="ar-dot" id="dot-1"><div class="ring-outer"></div><div class="ring"></div></div>
    <div class="ar-dot" id="dot-2"><div class="ring-outer"></div><div class="ring"></div></div>
    <div class="ar-dot" id="dot-3"><div class="ring-outer"></div><div class="ring"></div></div>

    <div id="annotation-card">
        <div class="ac-header">
            <span class="ac-title" id="ac-title">Titre</span>
            <span class="ac-close" id="ac-close">✕</span>
        </div>
        <div class="ac-body" id="ac-body">Texte</div>
        <span class="ac-tag" id="ac-tag">Tag</span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // ── Données des annotations ────────────────────────────────
        // Positions relatives à l'origine locale du wrapper de la statue.
        const ANNOTATIONS = [
            {
                id: 0,
                label: 'Tête',
                offset: new THREE.Vector3(0, 0.45, 0.05),
                title: 'La tête',
                body: 'Décrivez ici les détails de la tête de la statue : style, époque, matériau, symbolisme...',
                tag: 'Sculpture · XIXe s.'
            },
            {
                id: 1,
                label: 'Torse',
                offset: new THREE.Vector3(0.05, 0.1, 0.1),
                title: 'Le torse',
                body: 'Description du torse : posture, vêtements, décoration, technique de taille...',
                tag: 'Anatomie · Drapé'
            },
            {
                id: 2,
                label: 'Bras',
                offset: new THREE.Vector3(0.35, 0.05, 0.05),
                title: 'Le bras',
                body: 'Le bras et la main : geste symbolique, attribut tenu, détails de la sculpture...',
                tag: 'Geste · Symbolisme'
            },
            {
                id: 3,
                label: 'Socle',
                offset: new THREE.Vector3(0, -0.45, 0.05),
                title: 'Le socle',
                body: 'Le socle : inscription, date, matériau, contexte historique de l\'érection...',
                tag: 'Histoire · Épigraphie'
            },
        ];

        // ── UI refs ────────────────────────────────────────────────
        const selectionScreen = document.getElementById('selection-screen');
        const arContainer     = document.getElementById('ar-container');
        const msgEl           = document.getElementById('msg');
        const btnBack         = document.getElementById('btn-back');
        const controls        = document.getElementById('controls');
        const btnScan         = document.getElementById('btn-scan');
        const btnTouch        = document.getElementById('btn-touch');
        const tapHint         = document.getElementById('tap-hint');
        const annotCard       = document.getElementById('annotation-card');
        const dots            = ANNOTATIONS.map(a => document.getElementById('dot-' + a.id));

        let currentMode   = null;
        let statueModel   = null;
        let mindarTarget = null;
        let camera       = null;
        let renderer     = null;
        let anchor       = null;
        let manualGroup  = null;
        let arStarted    = false;
        let statueVisible = false;

        const worldPoints = ANNOTATIONS.map(() => new THREE.Vector3());

        const showMsg = t => { msgEl.textContent = t; };

        // ── Projection 3D → écran ──────────────────────────────────
        function projectToScreen(worldPos) {
            const v = worldPos.clone().project(camera);
            return {
                x: (v.x * 0.5 + 0.5) * window.innerWidth,
                y: (-v.y * 0.5 + 0.5) * window.innerHeight,
                visible: v.z < 1
            };
        }

        function updateDots() {
            if (!statueModel || !statueVisible) {
                dots.forEach(d => d.style.display = 'none');
                return;
            }

            // Correction cruciale : Forcer la mise à jour de la matrice monde avant de calculer les positions réelles
            statueModel.updateMatrixWorld(true);

            ANNOTATIONS.forEach((ann, i) => {
                const localPos = ann.offset.clone();
                statueModel.localToWorld(localPos);
                worldPoints[i].copy(localPos);

                const screen = projectToScreen(worldPoints[i]);
                const dot = dots[i];

                if (screen.visible &&
                    screen.x > 0 && screen.x < window.innerWidth &&
                    screen.y > 0 && screen.y < window.innerHeight) {
                    dot.style.display = 'block';
                    dot.style.left = screen.x + 'px';
                    dot.style.top  = screen.y + 'px';
                } else {
                    dot.style.display = 'none';
                }
            });
        }

        // ── Fiche annotation ───────────────────────────────────────
        function showAnnotation(ann) {
            document.getElementById('ac-title').textContent = ann.title;
            document.getElementById('ac-body').textContent  = ann.body;
            document.getElementById('ac-tag').textContent   = ann.tag;
            annotCard.style.display = 'block';
        }
        function closeAnnotation() { annotCard.style.display = 'none'; }

        document.getElementById('ac-close').addEventListener('click', closeAnnotation);

        dots.forEach((dot, i) => {
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                showAnnotation(ANNOTATIONS[i]);
            });
        });

        // ── Initialisation AR ──────────────────────────────────────
        function initAR() {
            mindarTarget = new MindARThree({
                container: arContainer,
                imageTargetSrc: './targets.mind',
                uiScanning: 'no',
            });

            const result = mindarTarget;
            renderer = result.renderer;
            camera   = result.camera;
            const scene = result.scene;

            renderer.outputColorSpace = THREE.SRGBColorSpace;
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(2, 4, 5); scene.add(dir);
            const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
            dir2.position.set(-2, -2, -3); scene.add(dir2);

            anchor      = mindarTarget.addAnchor(0);
            manualGroup = new THREE.Group();
            scene.add(manualGroup);

            anchor.onTargetFound = () => {
                if (currentMode === 'scan') {
                    statueVisible = true;
                    showMsg('✅ Cible trouvée — touchez un point lumineux');
                }
            };
            anchor.onTargetLost = () => {
                if (currentMode === 'scan') {
                    statueVisible = false;
                    closeAnnotation();
                    showMsg('🔍 Cherche la cible...');
                }
            };

            // Chargement GLB
            const draco = new DRACOLoader();
            draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(draco);

            loader.load('./Statue25.glb', (gltf) => {
                const model = gltf.scene;
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);

                const wrapper = new THREE.Group();
                wrapper.add(model);

                const targetWidthMeters = 0.2;
                const statueRealHeight  = 3.5;
                wrapper.scale.setScalar((statueRealHeight / Math.max(size.x, size.y, size.z)) * targetWidthMeters);

                // Rotations corrigées
                wrapper.rotation.x = -Math.PI / 2;
                wrapper.rotation.y = Math.PI;
                wrapper.rotation.z = Math.PI;

                statueModel = wrapper;

                if (currentMode === 'scan') {
                    anchor.group.add(statueModel);
                    showMsg('🔍 Visez votre image cible');
                } else {
                    manualGroup.add(statueModel);
                    statueModel.visible = false;
                    tapHint.style.display = 'block';
                }
            }, undefined, () => showMsg('❌ Erreur GLB'));

            // Tap mode tactile
            arContainer.addEventListener('click', (e) => {
                if (annotCard.style.display === 'block') {
                    closeAnnotation(); return;
                }
                if (currentMode !== 'touch' || !statueModel) return;

                const camDir = new THREE.Vector3(0, 0, -1);
                camDir.applyQuaternion(camera.quaternion);
                const pos = camera.position.clone().addScaledVector(camDir, 2);
                manualGroup.position.copy(pos);
                const lookTarget = new THREE.Vector3(camera.position.x, manualGroup.position.y, camera.position.z);
                manualGroup.lookAt(lookTarget);

                statueModel.visible = true;
                statueVisible = true;
                tapHint.style.display = 'none';
                showMsg('✅ Touchez un point lumineux pour en savoir plus');
            });

            // Boucle de rendu
            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
                updateDots();
            });
        }

        // ── Lancer l'AR ───────────────────────────────────────────
        async function launchAR(mode) {
            selectionScreen.style.display = 'none';
            arContainer.style.display     = 'block';
            msgEl.style.display           = 'block';
            btnBack.style.display         = 'block';
            controls.style.display        = 'flex';
            currentMode = mode;
            updateBtns();

            if (!arStarted) {
                showMsg('📷 Démarrage caméra...');
                initAR();
                try {
                    await mindarTarget.start();
                    document.querySelectorAll('.mindar-ui-overlay')
                        .forEach(el => el.style.display = 'none');
                    arStarted = true;
                    if (mode === 'scan') showMsg('🔍 Visez votre image cible');
                    else { showMsg(''); tapHint.style.display = 'block'; }
                } catch {
                    showMsg('❌ Caméra bloquée — HTTPS requis');
                }
            }
        }

        // ── Switch mode ───────────────────────────────────────────
        function setMode(mode) {
            currentMode = mode;
            updateBtns();
            closeAnnotation();
            if (!statueModel) return;

            if (mode === 'scan') {
                manualGroup.remove(statueModel);
                anchor.group.add(statueModel);
                statueModel.visible = true;
                tapHint.style.display = 'none';
                showMsg('🔍 Visez votre image cible');
            } else {
                anchor.group.remove(statueModel);
                manualGroup.add(statueModel);
                statueModel.visible = false;
                statueVisible = false;
                tapHint.style.display = 'block';
                showMsg('');
            }
        }

        function updateBtns() {
            btnScan.classList.toggle('active',  currentMode === 'scan');
            btnTouch.classList.toggle('active', currentMode === 'touch');
        }

        btnBack.addEventListener('click', () => {
            selectionScreen.style.display = 'flex';
            arContainer.style.display     = 'none';
            msgEl.style.display           = 'none';
            btnBack.style.display         = 'none';
            controls.style.display        = 'none';
            tapHint.style.display         = 'none';
            closeAnnotation();
            dots.forEach(d => d.style.display = 'none');
            statueVisible = false;
        });

        document.getElementById('pick-scan').addEventListener('click',  () => launchAR('scan'));
        document.getElementById('pick-touch').addEventListener('click', () => launchAR('touch'));
        btnScan.addEventListener('click',  () => setMode('scan'));
        btnTouch.addEventListener('click', () => setMode('touch'));
    </script>
</body>
</html>
