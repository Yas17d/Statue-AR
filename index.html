<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Musée en plein air du Sart Tilman</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: #0a0a0a; }
 
        #selection-screen {
            position: fixed; inset: 0; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; z-index: 100000; padding: 2rem;
        }
        #selection-screen h1 { color: white; font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 4px; line-height: 1.2; }
        #selection-screen p  { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-bottom: 12px; }
        
        .mode-card {
            width: 100%; max-width: 360px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px; padding: 18px 22px;
            display: flex; align-items: center; gap: 16px;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, border-color 0.2s;
        }
        .mode-card.highlight { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.5); }
        .mode-card h2 { color: white; font-size: 16px; font-weight: 600; margin: 0 0 4px; }
        .mode-card span { color: rgba(255,255,255,0.5); font-size: 13px; line-height: 1.3; }
 
        #ar-container { position: fixed; inset: 0; display: none; z-index: 10; }
 
        #msg {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: white;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            z-index: 99999; pointer-events: none; text-align: center;
            max-width: 90%; display: none;
        }
        #btn-back {
            position: fixed; top: 16px; left: 16px;
            background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 16px; border-radius: 10px;
            font-size: 14px; cursor: pointer; z-index: 100005;
            display: none; -webkit-tap-highlight-color: transparent;
        }
        
        #controls {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            display: none; gap: 8px; z-index: 99999; width: 90%; max-width: 360px;
            justify-content: center;
        }
        .btn {
            background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 14px; border-radius: 20px;
            font-weight: 600; font-size: 12px; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            flex: 1; text-align: center;
        }
        .btn.active { background: rgba(79,142,247,0.85); border-color: transparent; color: white; }
 
        /* ── Barre de navigation ── */
        #carousel-navigation-bar {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
            display: none; align-items: center; justify-content: space-between;
            z-index: 99999; width: 85%; max-width: 320px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px; padding: 4px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .nav-arrow {
            width: 40px; height: 40px; border: none;
            background: transparent; color: rgba(255, 255, 255, 0.8);
            font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-arrow:active { background: rgba(255, 255, 255, 0.15); color: #ffc832; }
        
        #carousel-title {
            color: white; font-weight: 600; font-size: 14px;
            flex: 1; text-align: center; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; padding: 0 8px;
        }
 
        /* ── Fiche annotation ── */
        #annotation-card {
            position: fixed; 
            bottom: 85px; 
            top: auto; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 26, 0.98);
            border: 1px solid rgba(255, 200, 50, 0.4);
            border-radius: 12px; padding: 18px;
            width: 90%; max-width: 350px;
            height: fit-content; 
            max-height: 65vh; 
            z-index: 99999; display: none;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            flex-direction: column;
        }
        #annotation-card .ac-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px; flex-shrink: 0;
        }
        #annotation-card .ac-title {
            color: #ffffff; font-size: 16px; font-weight: 700;
        }
        #ac-close {
            color: rgba(255,255,255,0.5); font-size: 18px; cursor: pointer;
            padding: 4px; line-height: 1;
        }
        #ac-close:active { color: white; }

        #annotation-card .ac-body {
            color: rgba(255,255,255,0.85);
            font-size: 14px; line-height: 1.5;
            overflow-y: auto; padding-right: 4px; flex-grow: 1;
        }
        #annotation-card .ac-body strong { color: #ffc832; font-weight: 500; }
        #annotation-card .ac-footer {
            margin-top: 12px; flex-shrink: 0;
        }
        #annotation-card .ac-tag {
            display: inline-block;
            background: rgba(255,200,50,0.12);
            color: #ffc832; border: 1px solid rgba(255,200,50,0.25);
            border-radius: 4px; padding: 2px 8px; font-size: 11px;
            font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
 
    <div id="selection-screen">
        <h1>Musée en plein air du Sart Tilman</h1>
        <p>Visite AR, Scannez et admirez</p>
        
        <div class="mode-card highlight" id="pick-info">
            <div><h2>Informations</h2><span>Guide d'utilisation de l'application</span></div>
        </div>
 
        <div class="mode-card" id="pick-perspectives">
            <div><h2>Perspectives</h2><span>Accessibilité et démocratisation de l'art</span></div>
        </div>
 
        <div class="mode-card" id="pick-scan">
            <div><h2>Mode Scan (AR)</h2><span>Détecte l'œuvre automatiquement via votre caméra</span></div>
        </div>
    </div>
 
    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>
    <button id="btn-back">← Retour</button>
    
    <div id="controls">
        <button id="btn-info" class="btn">Infos</button>
        <button id="btn-perspectives" class="btn">Perspectives</button>
        <button id="btn-scan" class="btn">Scan AR</button>
    </div>
 
    <div id="carousel-navigation-bar">
        <button class="nav-arrow" id="nav-prev">◂</button>
        <span id="carousel-title">Titre</span>
        <button class="nav-arrow" id="nav-next">▸</button>
    </div>
    
    <div id="annotation-card">
        <div class="ac-header">
            <span class="ac-title" id="ac-title">Titre</span>
            <span id="ac-close">✕</span>
        </div>
        <div class="ac-body" id="ac-body">Texte</div>
        <div class="ac-footer">
            <span class="ac-tag" id="ac-tag">Tag</span>
        </div>
    </div>
 
    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
 
        const DATA_INFOS = {
            info: [
                {
                    btnLabel: '1. Guide de l\'App',
                    title: 'Mode d\'emploi de l\'application',
                    body: 'Bienvenue ! Cette application vous permet de découvrir les œuvres d\'art du Sart Tilman en réalité augmentée.<br><br><strong>Comment utiliser le mode Scan AR ?</strong><br>1. Cliquez sur le bouton "Mode Scan".<br>2. Autorisez l\'accès à votre appareil photo.<br>3. Dirigez votre smartphone vers <strong>la statue ou une photo de celle-ci</strong> pour faire apparaître le modèle 3D superposé.',
                    tag: 'Aide · Guide'
                }
            ],
            perspectives: [
                {
                    btnLabel: '1. Un art pour tous',
                    title: 'Démocratiser l\'accès aux œuvres',
                    body: 'L\'objectif principal de cette application est de rendre les œuvres existantes du Sart Tilman <strong>accessibles à absolument tout le monde</strong>. La réalité augmentée permet de s\'affranchir des distances géographiques, offrant la possibilité d\'admirer ces chefs-d\'œuvre depuis chez soi, à l\'école ou de n\'importe où dans le monde.',
                    tag: 'Accessibilité · Inclusion'
                },
                {
                    btnLabel: '2. Inclusion & Mobilité',
                    title: 'Dépasser les obstacles physiques',
                    body: 'Le Musée en plein air s\'étend sur un vaste domaine naturel boisé, ce qui peut représenter un défi pour les personnes à mobilité réduite ou en situation de handicap. Grâce à ce dispositif, <strong>les œuvres viennent directement à l\'utilisateur</strong>, garantissant une égalité d\'accès à la culture sans se soucier des contraintes de terrain.',
                    tag: 'Égalité · Mobilité'
                },
                {
                    btnLabel: '3. Médiation enrichie',
                    title: 'Comprendre et manipuler',
                    body: 'Au-delà de l\'aspect purement visuel, cette technologie permet de superposer des explications claires et interactives sur les œuvres de la collection liégeoise. Cette approche s\'adresse à tous les publics (familles, curieux, étudiants), rendant l\'art contemporain beaucoup plus accessible et compréhensible.',
                    tag: 'Pédagogie · Démocratisation'
                }
            ],
            scan: [
                { 
                    btnLabel: '1. Le Pâtre', 
                    title: 'Le Pâtre (Fiche technique)', 
                    body: '<strong>Artiste :</strong> Idel Ianchelevici<br><strong>Année :</strong> 1956<br><strong>Matériaux :</strong> Bronze<br><strong>Dimensions :</strong> Hauteur : 340 cm · Longueur : 93 cm · Largeur : 54,5 cm.', 
                    tag: 'Général · Statuaire' 
                },
                { 
                    btnLabel: '2. Origine du projet', 
                    title: 'Le projet colonial (1/2)', 
                    body: 'Au milieu des années 1950, l’État belge commande à Ianchelevici des bas-reliefs pour un monument à Léopoldville (Kinshasa) dédié à l\'explorateur Stanley. Mais une fois sur place, le sculpteur bouleverse le projet : il choisit de créer de monumentales <strong>statues en ronde-bosse</strong>.', 
                    tag: 'Histoire · Contexte' 
                },
                { 
                    btnLabel: '3. Un symbole fort', 
                    title: 'La dignité célébrée (2/2)', 
                    body: 'Ianchelevici sculpte trois piliers de l’économie traditionnelle : <strong>le pâtre, le pêcheur et le chasseur</strong>. Loin des clichés coloniaux de l\'époque, il magnifie l\'homme africain dans une <strong>dignité enfin reconnue</strong>. Preuve de la force du symbole : alors que les statues coloniales ont été déboulonnées à Kinshasa, ces trois œuvres y sont toujours fièrement en place.', 
                    tag: 'Histoire · Symbole' 
                },
                { 
                    btnLabel: '4. L\'Artiste', 
                    title: 'Idel Ianchelevici (1909-1994)', 
                    body: 'Arrivé à Liège en 1928, il décroche le 1er prix de statuaire des Beaux-Arts en 1933. Installé ensuite en région parisienne, sa carrière est jalonnée de chefs-d’œuvre monumentaux acclamés à travers l\'Europe, comme <strong>Le Plongeur</strong> (Liège, 1939) ou <strong>Le Résistant</strong> (Fort de Breendonk, 1947).', 
                    tag: 'Biographie · Maître' 
                },
                { 
                    btnLabel: '5. Prix Triennal', 
                    title: 'Mise à l\'honneur', 
                    body: 'Depuis 1997, le Musée en plein air perpétue la mémoire et le génie du sculpteur en organisant le prestigieux <strong>Prix Triennal Ianchelevici</strong>, créé à l’initiative de l’ASBL « Les Amis de Ianchelevici ».', 
                    tag: 'Héritage · Distinction' 
                }
            ]
        };
                    
        let currentIndex = 0;
        let currentMode   = null;
        
        const selectionScreen = document.getElementById('selection-screen');
        const arContainer     = document.getElementById('ar-container');
        const msgEl           = document.getElementById('msg');
        const btnBack         = document.getElementById('btn-back');
        const controls        = document.getElementById('controls');
        const btnScan         = document.getElementById('btn-scan');
        const btnInfo         = document.getElementById('btn-info');
        const btnPersp        = document.getElementById('btn-perspectives');
        const annotCard       = document.getElementById('annotation-card');
        const carouselBar     = document.getElementById('carousel-navigation-bar');
        const carouselTitle   = document.getElementById('carousel-title');
 
        let statueModel  = null;
        let mindarTarget = null;
        let arStarted    = false;
 
        const showMsg = t => { msgEl.textContent = t; };
 
        function updateInfoDisplay() {
            const currentDataArray = DATA_INFOS[currentMode];
            if (!currentDataArray || currentDataArray.length === 0) return;
            
            if (currentIndex >= currentDataArray.length) currentIndex = 0;
            
            const data = currentDataArray[currentIndex];
            carouselTitle.textContent = data.btnLabel;
            
            document.getElementById('ac-title').innerHTML = data.title;
            document.getElementById('ac-body').innerHTML  = data.body;
            document.getElementById('ac-tag').textContent   = data.tag;
            
            if (currentMode !== 'scan') {
                annotCard.style.display = 'flex';
            }
        }
 
        function closeInfoCard() {
            annotCard.style.display = 'none';
        }

        document.getElementById('ac-close').addEventListener('click', closeInfoCard);

        carouselBar.addEventListener('click', (e) => {
            if (e.target.classList.contains('nav-arrow')) return;

            if (currentMode === 'scan') {
                if (annotCard.style.display === 'none' || annotCard.style.display === '') {
                    annotCard.style.display = 'flex';
                } else {
                    annotCard.style.display = 'none';
                }
            }
        });

        document.getElementById('nav-prev').addEventListener('click', (e) => {
            e.stopPropagation();
            const len = DATA_INFOS[currentMode].length;
            currentIndex = (currentIndex - 1 + len) % len;
            updateInfoDisplay();
            if (currentMode === 'scan') annotCard.style.display = 'flex'; 
        });
 
        document.getElementById('nav-next').addEventListener('click', (e) => {
            e.stopPropagation();
            const len = DATA_INFOS[currentMode].length;
            currentIndex = (currentIndex + 1) % len;
            updateInfoDisplay();
            if (currentMode === 'scan') annotCard.style.display = 'flex'; 
        });
 
        function initAR() {
            if (mindarTarget) return;
 
            mindarTarget = new MindARThree({
                container: arContainer,
                imageTargetSrc: './targets.mind',
                uiScanning: 'no',
            });
 
            const { renderer, camera, scene } = mindarTarget;
 
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            const dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(2, 4, 5); scene.add(dir);
 
            const anchor = mindarTarget.addAnchor(0);
 
            anchor.onTargetFound = () => {
                if (currentMode === 'scan') {
                    showMsg('Cible trouvée');
                    carouselBar.style.display = 'flex';
                    annotCard.style.display = 'none'; 
                    updateInfoDisplay();
                }
            };
            anchor.onTargetLost = () => {
                if (currentMode === 'scan') {
                    annotCard.style.display = 'none';
                    carouselBar.style.display = 'none';
                    showMsg('Cherche la cible...');
                }
            };
 
            const draco = new DRACOLoader();
            draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(draco);
 
            loader.load('./Statue25.glb', (gltf) => {
                const model = gltf.scene;
                const box    = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size   = box.getSize(new THREE.Vector3());
                model.position.sub(center);
 
                const wrapper = new THREE.Group();
                wrapper.add(model);
 
                const targetWidthMeters = 3.0;
                const statueRealHeight  = 3.5;
                const scaleFactor = (statueRealHeight / Math.max(size.x, size.y, size.z)) * targetWidthMeters;
                wrapper.scale.setScalar(scaleFactor);
 
                wrapper.rotation.x = -Math.PI / 2;
                wrapper.rotation.y =  Math.PI;
                wrapper.rotation.z =  Math.PI;
 
                statueModel = wrapper;
                anchor.group.add(statueModel);
 
            }, undefined, () => showMsg('Erreur GLB'));
 
            renderer.setAnimationLoop(() => {
                if (currentMode === 'scan' && arStarted) renderer.render(scene, camera);
            });
        }
 
        async function switchViewMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            
            selectionScreen.style.display = 'none';
            btnBack.style.display         = 'block';
            controls.style.display        = 'flex';
            updateBtns();
 
            if (mode === 'scan') {
                arContainer.style.display = 'block';
                msgEl.style.display       = 'block';
                carouselBar.style.display = 'none';
                annotCard.style.display   = 'none';
                
                if (!arStarted) {
                    showMsg('Démarrage caméra...');
                    initAR();
                    try {
                        await mindarTarget.start();
                        document.querySelectorAll('.mindar-ui-overlay').forEach(el => el.style.display = 'none');
                        arStarted = true;
                        showMsg('Visez la statue ou une photo');
                    } catch {
                        showMsg('Caméra bloquée');
                    }
                } else {
                    showMsg('Visez la statue ou une photo');
                }
            } else {
                if (arStarted && mindarTarget) {
                    mindarTarget.stop();
                    const video = arContainer.querySelector('video');
                    if (video) {
                        const tracks = video.srcObject?.getTracks();
                        if (tracks) tracks.forEach(track => track.stop());
                    }
                    arStarted = false;
                }
                
                arContainer.style.display = 'none';
                msgEl.style.display       = 'none';
                
                carouselBar.style.display = 'flex';
                updateInfoDisplay();
            }
        }
 
        function updateBtns() {
            btnScan.classList.toggle('active', currentMode === 'scan');
            btnInfo.classList.toggle('active', currentMode === 'info');
            btnPersp.classList.toggle('active', currentMode === 'perspectives');
        }
 
        btnBack.addEventListener('click', () => {
            if (arStarted && mindarTarget) {
                mindarTarget.stop();
                const video = arContainer.querySelector('video');
                if (video) {
                    const tracks = video.srcObject?.getTracks();
                    if (tracks) tracks.forEach(track => track.stop());
                }
                arStarted = false;
            }
            selectionScreen.style.display = 'flex';
            arContainer.style.display     = 'none';
            msgEl.style.display           = 'none';
            btnBack.style.display         = 'none';
            controls.style.display        = 'none';
            carouselBar.style.display     = 'none';
            annotCard.style.display       = 'none';
        });
 
        document.getElementById('pick-info').addEventListener('click', () => switchViewMode('info'));
        document.getElementById('pick-perspectives').addEventListener('click', () => switchViewMode('perspectives'));
        document.getElementById('pick-scan').addEventListener('click',  () => switchViewMode('scan'));
        
        btnScan.addEventListener('click',  () => switchViewMode('scan'));
        btnInfo.addEventListener('click', () => switchViewMode('info'));
        btnPersp.addEventListener('click', () => switchViewMode('perspectives'));
    </script>
</body>
</html>
