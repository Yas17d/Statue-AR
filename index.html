<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Test AR minimal</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            position: relative;
        }
        #ar-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #msg {
            position: fixed; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white; padding: 8px 16px;
            border-radius: 20px; font-family: sans-serif;
            font-size: 14px; z-index: 99;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ar-container"></div>
    <div id="msg">Initialisation...</div>

    <script type="module">
        import * as THREE from 'three';
        import { MindARThree } from
            'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';

        const msg = document.getElementById('msg');

        const mindarTarget = new MindARThree({
            container: document.querySelector('#ar-container'),
            imageTargetSrc:
                'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind',
            uiScanning: "yes",
            filterMinCF: 0.001,
            filterBeta: 0.01,
            missTolerance: 10,
            warmupTolerance: 5,
        });

        const { renderer, scene, camera } = mindarTarget;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const anchor = mindarTarget.addAnchor(0);

        const cube = new THREE.Mesh(
            new THREE.BoxGeometry(0.5, 0.5, 0.5),
            new THREE.MeshNormalMaterial()
        );
        anchor.group.add(cube);

        anchor.onTargetFound = () => { msg.textContent = '✅ Cible trouvée !'; };
        anchor.onTargetLost  = () => { msg.textContent = '🔍 Cherche la cible...'; };

        try {
            msg.textContent = 'Démarrage caméra...';
            await mindarTarget.start();
            msg.textContent = '🔍 Pointe vers la carte de démo';
        } catch(e) {
            msg.textContent = '❌ ' + (e?.message || 'Caméra indisponible — HTTPS requis');
        }

        renderer.setAnimationLoop(() => {
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
